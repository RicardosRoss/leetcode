name: 'Chain Hi Every 5h'

on:
    workflow_run:
      workflows: ["Daily GLM Coding Plan"]
      types: [completed]
      branches: [master]
    workflow_dispatch:
      inputs:
        iteration:
          description: 'Current iteration (1-3)'
          default: '1'

jobs:
    chain-hi:
      runs-on: ubuntu-latest
      timeout-minutes: 360
      if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
      permissions:
        actions: write
        contents: write
        pull-requests: write
        issues: write
        id-token: write
      env:
        ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
        ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
        API_TIMEOUT_MS: 600000
      steps:
        - uses: actions/checkout@v4
          with:
            fetch-depth: 0

        - name: Wait 5 hours
          run: sleep 18000

        - name: Send hi
          uses: anthropics/claude-code-action@v1
          with:
            anthropic_api_key: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
            prompt: hi
            claude_args: '--model glm-4.7'

        - name: Dispatch next iteration
          if: github.event.inputs.iteration < '3'
          run: |
            NEXT=$(( ${{ github.event.inputs.iteration || 1 }} + 1 ))
            gh workflow run chain-hi-every-5h.yaml -f iteration=$NEXT
          env:
            GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
